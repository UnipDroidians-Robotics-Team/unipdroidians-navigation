# =============================================================================
#  nav2_params.yaml — UDH1  (sem RealSense — fallback)
#  Salve em: ~/Navigation/src/udh1_mapping/config/nav2_params.yaml
#
#  Correções aplicadas:
#    1. min_y_velocity_threshold: 0.5 → 0.001 (robô diferencial não tem vel. lateral)
#    2. transform_tolerance aumentado em pontos críticos (TF mais tolerante)
#    3. progress_checker: required_movement_radius reduzido (detecta movimentos menores)
#    4. odom_topic explícito no AMCL e bt_navigator
# =============================================================================

amcl:
  ros__parameters:
    use_sim_time: false
    scan_topic:      /scan_limpo
    odom_topic:      /odom               # explícito para garantir que o AMCL escuta certo
    base_frame_id:   base_footprint
    odom_frame_id:   odom
    global_frame_id: map
    robot_model_type: nav2_amcl::DifferentialMotionModel
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    # Mais partículas para compensar os 180° (sem visão traseira)
    min_particles: 1000
    max_particles: 3000
    laser_model_type: likelihood_field
    laser_max_range:  12.0
    laser_min_range:  0.15
    laser_likelihood_max_dist: 2.0
    max_beams: 60
    # Atualiza mais frequente para compensar campo de visão reduzido
    update_min_d: 0.15
    update_min_a: 0.1
    resample_interval: 1
    # Aumentado: dá mais margem para atraso entre odom e scan
    transform_tolerance: 1.5
    tf_broadcast: true
    save_pose_rate: 0.5
    z_hit:    0.5
    z_short:  0.05
    z_max:    0.05
    z_rand:   0.5
    sigma_hit:    0.2
    lambda_short: 0.1
    beam_skip_distance:        0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold:       0.3
    do_beamskip: false
    pf_err: 0.05
    pf_z:   0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame:     map
    robot_base_frame: base_footprint
    odom_topic:       /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    # CORREÇÃO PRINCIPAL: min_y era 0.5 — robô diferencial nunca tem vel. lateral
    # Com 0.5 o Nav2 nunca reconhecia que o robô estava se movendo
    min_x_velocity_threshold:     0.001
    min_y_velocity_threshold:     0.001   # ← corrigido de 0.5 para 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      # Reduzido: detecta progressos menores (robô lento já conta como movimento)
      required_movement_radius: 0.3    # era 0.5
      movement_time_allowance: 15.0   # era 10.0 — mais tempo para o robô se mover

    general_goal_checker:
      stateful: true
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance:  0.15
      yaw_goal_tolerance: 0.5

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.3
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x:     2.5
      acc_lim_y:     0.0
      acc_lim_theta: 3.2
      decel_lim_x:     -2.5
      decel_lim_y:     0.0
      decel_lim_theta: -3.2
      vx_samples:     20
      vy_samples:     5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity:  0.05
      angular_granularity: 0.025
      # Aumentado: mais tolerante com atraso de TF
      transform_tolerance: 1.0        # era 0.5
      xy_goal_tolerance: 0.15
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics:
        [RotateToGoal, Oscillation, BaseObstacle, GoalAlign, PathAlign, PathDist, GoalDist]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 8.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 0.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic:   local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: [backup, wait]
    spin:
      plugin: nav2_recoveries/Spin
    backup:
      plugin: nav2_recoveries/BackUp
    wait:
      plugin: nav2_recoveries/Wait
    global_frame:      odom
    robot_base_frame:  base_footprint
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel:  1.0
    min_rotational_vel:  0.4
    rotational_acc_lim:  3.2

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame:     odom
      robot_base_frame: base_footprint
      rolling_window: true
      width:  4
      height: 4
      resolution: 0.05
      robot_radius: 0.34
      plugins: [voxel_layer, inflation_layer]

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.05
        max_obstacle_height: 1.80
        mark_threshold: 0
        observation_persistence: 0.0
        observation_sources: scan
        scan:
          topic: /scan_limpo
          data_type: LaserScan
          max_obstacle_height: 0.50
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame:     map
      robot_base_frame: base_footprint
      robot_radius: 0.34
      resolution: 0.05
      track_unknown_space: true
      plugins: [static_layer, obstacle_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_limpo
          data_type: LaserScan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/joao/athome_ws/mapas/mapa_udh1.yaml"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200